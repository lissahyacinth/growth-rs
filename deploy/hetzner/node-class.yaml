apiVersion: growth.vettrdev.com/v1alpha1
kind: HetznerNodeClass
metadata:
  name: k3s-agent
spec:
  image: ubuntu-24.04
  sshKeyNames:
    - my-ssh-key              # Replace with your Hetzner SSH key name
  userData:
    templateRef:
      name: k3s-cloud-init    # ConfigMap with the cloud-init template
      namespace: default
      key: cloud-init.sh
    variables:
      - name: K3S_URL
        secretRef:
          name: k3s-join
          namespace: default
          key: url
      - name: K3S_TOKEN
        secretRef:
          name: k3s-join
          namespace: default
          key: token
