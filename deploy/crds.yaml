---

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: noderequests.growth.vettrdev.com
spec:
  group: growth.vettrdev.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["targetOffering", "nodeID", "location"]
              properties:
                nodeID:
                  type: string
                  maxLength: 63 # Fit under instance name limit for most providers
                  pattern: '^[a-z]([-a-z0-9]*[a-z0-9])?$'
                targetOffering:
                  type: string
                location:
                  type: string
                  description: Provider location/region for this node, e.g. "nbg1".
                resources:
                  type: object
                  required: ["cpu", "memoryMib", "gpu"]
                  properties:
                    cpu:
                      type: integer
                    memoryMib:
                      type: integer
                    ephemeralStorageGib:
                      type: integer
                    gpu:
                      type: integer
                    gpuModel:
                      type: string

            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Unmet
                    - Deprovisioning
                  default: Pending
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Offering
          type: string
          jsonPath: .spec.targetOffering
  scope: Cluster
  names:
    plural: noderequests
    singular: noderequest
    kind: NodeRequest
    shortNames:
      - nr


---

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodepools.growth.vettrdev.com
spec:
  group: growth.vettrdev.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["serverTypes"]
              properties:
                serverTypes:
                  type: array
                  items:
                    type: object
                    required: ["name", "max"]
                    properties:
                      name:
                        type: string
                      min:
                        type: integer
                        default: 0
                      max:
                        type: integer
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Labels applied to every node provisioned from this pool.
                locations:
                  type: array
                  description: >-
                    If set, only offerings matching at least one entry are eligible.
                    Each entry scopes allowed zones to a specific region. Omit for all regions/zones.
                  items:
                    type: object
                    required: ["region"]
                    properties:
                      region:
                        type: string
                        description: Region name that offerings must match.
                      zones:
                        type: array
                        items:
                          type: string
                        description: >-
                          If set, only offerings in these zones within the region are eligible.
                          Omit to allow all zones in the region.
                nodeClassRef:
                  type: object
                  description: >-
                    Optional reference to a provider-specific NodeClass
                    (e.g. HetznerNodeClass) for instance configuration.
                  required: ["name"]
                  properties:
                    name:
                      type: string
                      description: Name of the NodeClass resource.
            status:
              type: object
      subresources:
        status: {}
  scope: Cluster
  names:
    plural: nodepools
    singular: nodepool
    kind: NodePool
    shortNames:
      - np

---

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: noderemovalrequests.growth.vettrdev.com
spec:
  group: growth.vettrdev.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["nodeName", "pool", "instanceType"]
              properties:
                nodeName:
                  type: string
                pool:
                  type: string
                instanceType:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Deprovisioning
                    - CouldNotRemove
                  default: Pending
                removalAttempts:
                  type: integer
                  default: 0
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Attempts
          type: integer
          jsonPath: .status.removalAttempts
  scope: Cluster
  names:
    plural: noderemovalrequests
    singular: noderemovalrequest
    kind: NodeRemovalRequest
    shortNames:
      - nrr

---

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hetznernodeclasses.growth.vettrdev.com
spec:
  group: growth.vettrdev.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["image", "sshKeyNames", "userData"]
              properties:
                image:
                  type: string
                  description: OS image for the server, e.g. "ubuntu-24.04" or "talos-v1.9".
                sshKeyNames:
                  type: array
                  items:
                    type: string
                  description: Hetzner SSH key names to install on the server.
                userData:
                  type: object
                  required: ["templateRef"]
                  description: User-data template with variable substitution.
                  properties:
                    templateRef:
                      type: object
                      required: ["name", "namespace", "key"]
                      description: ConfigMap containing the raw template (e.g. cloud-init YAML).
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                    variables:
                      type: array
                      description: >-
                        Named variables whose values replace {{ name }} placeholders
                        in the template. Each variable reads its value from a Secret.
                      items:
                        type: object
                        required: ["name", "secretRef"]
                        properties:
                          name:
                            type: string
                            description: Placeholder name used as {{ name }} in the template.
                          secretRef:
                            type: object
                            required: ["name", "namespace", "key"]
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                              key:
                                type: string
            status:
              type: object
      subresources:
        status: {}
  scope: Cluster
  names:
    plural: hetznernodeclasses
    singular: hetznernodeclass
    kind: HetznerNodeClass
    shortNames:
      - hnc
